[project]
name = "java_observability_forced"

[topo]
root = "topo/main.topo"

[build]
language = "java"
sources = ["src/main/java"]
output = "java_observability_forced.jar"
output_type = "exe"

[build.java]
target_version = "21"

[observability]
mode = "force"
exporter = "stdout"

[builder]
mode = "aggressive"
