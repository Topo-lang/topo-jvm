[project]
name = "java_adaptive_base"

[topo]
root = "topo/main.topo"

[build]
language = "java"
sources = ["src/main/java"]
output = "java_adaptive_base.jar"
output_type = "exe"
embed_ir = true

[build.java]
target_version = "21"

[parallel]
mode = "force"
instrument = true

[adaptive]
mode = "off"

[builder]
mode = "dev"
