[project]
name = "java_prefetch"

[topo]
root = "topo/main.topo"

[build]
language = "java"
sources = ["src/main/java"]
output = "java_prefetch.jar"
output_type = "exe"

[build.java]
target_version = "21"

[optimize.prefetch]
mode = "auto"
distance = 8

[optimize.type-narrowing]
mode = "force"

[builder]
mode = "dev"
